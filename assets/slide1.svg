<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003d82"/>
      <stop offset="60%" style="stop-color:#0055b0"/>
      <stop offset="100%" style="stop-color:#006edb"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fa3f0;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#006edb;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1400" height="900" fill="url(#bg1)"/>
  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="150" x2="1400" y2="150"/>
    <line x1="0" y1="300" x2="1400" y2="300"/>
    <line x1="0" y1="450" x2="1400" y2="450"/>
    <line x1="0" y1="600" x2="1400" y2="600"/>
    <line x1="0" y1="750" x2="1400" y2="750"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>
  <!-- Large circles decorative -->
  <circle cx="1100" cy="450" r="320" fill="rgba(79,163,240,0.08)"/>
  <circle cx="1100" cy="450" r="220" fill="rgba(79,163,240,0.06)"/>
  <circle cx="1100" cy="450" r="120" fill="rgba(79,163,240,0.1)"/>
  <!-- Shield / protection motif -->
  <path d="M980 200 L860 250 L860 400 C860 480 920 540 980 570 C1040 540 1100 480 1100 400 L1100 250 Z" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <path d="M1020 180 L900 230 L900 380 C900 460 960 520 1020 550 C1080 520 1140 460 1140 380 L1140 230 Z" fill="rgba(255,255,255,0.04)"/>
  <!-- Dots pattern -->
  <g fill="rgba(255,255,255,0.06)">
    <circle cx="50" cy="50" r="3"/><circle cx="100" cy="50" r="3"/><circle cx="150" cy="50" r="3"/>
    <circle cx="50" cy="100" r="3"/><circle cx="100" cy="100" r="3"/><circle cx="150" cy="100" r="3"/>
    <circle cx="50" cy="150" r="3"/><circle cx="100" cy="150" r="3"/><circle cx="150" cy="150" r="3"/>
  </g>
  <!-- Bottom accent bar -->
  <rect x="0" y="860" width="1400" height="40" fill="rgba(0,0,0,0.15)"/>
  <!-- Company tagline placeholder -->
  <text x="140" y="500" font-family="Georgia,serif" font-size="52" font-weight="700" fill="rgba(255,255,255,0.06)" letter-spacing="2">CLARKSON</text>
</svg>
