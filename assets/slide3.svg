<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#004a9f"/>
      <stop offset="60%" style="stop-color:#0060c8"/>
      <stop offset="100%" style="stop-color:#1a7de8"/>
    </linearGradient>
    <radialGradient id="glow3" cx="70%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.07)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#bg3)"/>
  <rect width="1400" height="900" fill="url(#glow3)"/>
  <!-- Concentric circles, abstract data/network visual -->
  <g stroke="rgba(255,255,255,0.06)" fill="none" stroke-width="1">
    <circle cx="1050" cy="450" r="80"/>
    <circle cx="1050" cy="450" r="160"/>
    <circle cx="1050" cy="450" r="240"/>
    <circle cx="1050" cy="450" r="320"/>
    <circle cx="1050" cy="450" r="400"/>
  </g>
  <!-- Network nodes -->
  <g fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.1)" stroke-width="1">
    <circle cx="1050" cy="450" r="12"/>
    <circle cx="1050" cy="290" r="8"/>
    <circle cx="1050" cy="610" r="8"/>
    <circle cx="890" cy="450" r="8"/>
    <circle cx="1210" cy="450" r="8"/>
    <circle cx="937" cy="337" r="6"/>
    <circle cx="1163" cy="337" r="6"/>
    <circle cx="937" cy="563" r="6"/>
    <circle cx="1163" cy="563" r="6"/>
  </g>
  <!-- Network lines -->
  <g stroke="rgba(255,255,255,0.08)" stroke-width="1">
    <line x1="1050" y1="450" x2="1050" y2="290"/>
    <line x1="1050" y1="450" x2="1050" y2="610"/>
    <line x1="1050" y1="450" x2="890" y2="450"/>
    <line x1="1050" y1="450" x2="1210" y2="450"/>
    <line x1="1050" y1="450" x2="937" y2="337"/>
    <line x1="1050" y1="450" x2="1163" y2="337"/>
    <line x1="1050" y1="450" x2="937" y2="563"/>
    <line x1="1050" y1="450" x2="1163" y2="563"/>
  </g>
  <!-- Horizontal lines pattern left -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="250" x2="600" y2="250"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="350" x2="600" y2="350"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="450" x2="600" y2="450"/>
    <line x1="0" y1="500" x2="600" y2="500"/>
    <line x1="0" y1="550" x2="600" y2="550"/>
    <line x1="0" y1="600" x2="600" y2="600"/>
    <line x1="0" y1="650" x2="600" y2="650"/>
    <line x1="0" y1="700" x2="600" y2="700"/>
  </g>
  <!-- Small accent dots -->
  <g fill="rgba(79,163,240,0.4)">
    <circle cx="140" cy="300" r="4"/>
    <circle cx="200" cy="280" r="3"/>
    <circle cx="260" cy="310" r="4"/>
    <circle cx="320" cy="290" r="3"/>
    <circle cx="380" cy="315" r="4"/>
  </g>
  <polyline points="140,300 200,280 260,310 320,290 380,315" fill="none" stroke="rgba(79,163,240,0.25)" stroke-width="1.5"/>
</svg>
