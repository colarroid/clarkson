<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a4d"/>
      <stop offset="50%" style="stop-color:#003d82"/>
      <stop offset="100%" style="stop-color:#005ab5"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#bg2)"/>
  <!-- Diagonal lines pattern -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1.5">
    <line x1="-100" y1="0" x2="500" y2="900"/>
    <line x1="100" y1="0" x2="700" y2="900"/>
    <line x1="300" y1="0" x2="900" y2="900"/>
    <line x1="500" y1="0" x2="1100" y2="900"/>
    <line x1="700" y1="0" x2="1300" y2="900"/>
    <line x1="900" y1="0" x2="1500" y2="900"/>
  </g>
  <!-- City / building silhouettes -->
  <g fill="rgba(255,255,255,0.05)">
    <rect x="800" y="500" width="60" height="400"/>
    <rect x="870" y="450" width="80" height="450"/>
    <rect x="960" y="400" width="50" height="500"/>
    <rect x="1020" y="480" width="70" height="420"/>
    <rect x="1100" y="360" width="90" height="540"/>
    <rect x="1200" y="430" width="60" height="470"/>
    <rect x="1270" y="500" width="80" height="400"/>
    <rect x="1360" y="460" width="60" height="440"/>
  </g>
  <!-- Window lights in buildings -->
  <g fill="rgba(255,255,255,0.08)">
    <rect x="815" y="520" width="8" height="10"/>
    <rect x="830" y="520" width="8" height="10"/>
    <rect x="815" y="540" width="8" height="10"/>
    <rect x="890" y="480" width="10" height="12"/>
    <rect x="910" y="480" width="10" height="12"/>
    <rect x="890" y="502" width="10" height="12"/>
    <rect x="910" y="502" width="10" height="12"/>
    <rect x="1115" y="390" width="12" height="14"/>
    <rect x="1135" y="390" width="12" height="14"/>
    <rect x="1155" y="390" width="12" height="14"/>
    <rect x="1115" y="414" width="12" height="14"/>
    <rect x="1155" y="414" width="12" height="14"/>
  </g>
  <!-- Large decorative circle -->
  <circle cx="300" cy="450" r="350" fill="rgba(0,110,219,0.08)"/>
  <circle cx="300" cy="450" r="250" fill="rgba(79,163,240,0.05)"/>
  <!-- Number 60+ highlight -->
  <text x="700" y="520" font-family="Georgia,serif" font-size="200" font-weight="700" fill="rgba(255,255,255,0.04)" letter-spacing="-5">60</text>
</svg>
